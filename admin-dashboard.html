<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BigShopper Scraper - Admin Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;height:100%}
.app{display:flex;height:100vh}

/* LOGIN SCREEN */
.login-screen{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
.login-box{background:white;padding:40px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.2);width:100%;max-width:400px}
.login-box h1{font-size:28px;margin-bottom:30px;color:#333;text-align:center}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;font-size:13px;font-weight:700;color:#333;text-transform:uppercase}
.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.form-group input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;text-transform:uppercase;transition:all 0.2s}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,0.4)}
.login-error{color:#ef4444;font-size:12px;margin-top:10px;text-align:center}
.hidden{display:none}

/* DASHBOARD */
.dashboard{width:100%;height:100%;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px}
.btn-logout{background:rgba(255,255,255,0.2);color:white;border:1px solid white;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700}
.btn-logout:hover{background:rgba(255,255,255,0.3)}
.content{display:flex;flex:1;gap:20px;padding:20px;overflow:hidden}
.left-panel{width:450px;background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.1);display:flex;flex-direction:column;overflow-y:auto}
.right-panel{flex:1;background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.1);display:flex;flex-direction:column;overflow:hidden}
.left-panel h2{font-size:18px;color:#333;margin-bottom:15px;font-weight:700}
.form-group label{display:block;margin-bottom:6px;font-size:12px;font-weight:700;color:#333;text-transform:uppercase}
.form-group textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:12px;min-height:120px;font-family:monospace;resize:vertical}
.form-group textarea:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px}
.stat{background:#f8f9fa;padding:12px;border-radius:8px;text-align:center;border:1px solid #e9ecef}
.stat-label{font-size:11px;color:#999;margin-bottom:6px;font-weight:600;text-transform:uppercase}
.stat-value{font-size:24px;font-weight:700;color:#667eea}
.btn{padding:12px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;width:100%;margin-bottom:10px;text-transform:uppercase;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 16px rgba(102,126,234,0.4)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed}
.btn-secondary{background:#f0f0f0;color:#333}
.btn-secondary:hover{background:#e0e0e0}
.right-panel h2{font-size:20px;color:#333;margin-bottom:15px;font-weight:700}
.progress-bar{width:100%;height:28px;background:#e9ecef;border-radius:8px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);width:0%;transition:width 0.3s;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700}
.results-container{flex:1;overflow-y:auto;border:1px solid #e9ecef;border-radius:8px;padding:15px}
.result-item{background:#f9f9f9;padding:15px;margin-bottom:12px;border-radius:8px;border-left:4px solid #667eea}
.result-item.success{background:#f0fdf4;border-left-color:#22c55e}
.result-item.error{background:#fef2f2;border-left-color:#ef4444}
.result-item h3{font-size:13px;font-weight:700;margin-bottom:8px;color:#333}
.best-price{font-size:12px;font-weight:700;color:#22c55e;margin-bottom:10px}
.shops-list{margin-top:10px}
.shop-item{background:white;padding:10px;margin-bottom:6px;border-radius:6px;border-left:3px solid #667eea;font-size:11px}
.shop-item strong{color:#333;display:block}
.shop-item .price{color:#22c55e;font-weight:700;float:right}
.shop-item .details{color:#666;font-size:10px;margin-top:4px;clear:both;line-height:1.4}
.empty-state{text-align:center;color:#999;padding:40px 20px}
.badge{display:inline-block;background:#667eea;color:white;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;margin-right:4px}
.success-msg{background:#f0fdf4;border:1px solid #22c55e;color:#22c55e;padding:12px;border-radius:6px;margin-bottom:15px;font-size:12px}
.error-msg{background:#fef2f2;border:1px solid #ef4444;color:#ef4444;padding:12px;border-radius:6px;margin-bottom:15px;font-size:12px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <h1>🚀 BigShopper</h1>
    <form onsubmit="login(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">Login</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard hidden">
  <div class="header">
    <h1>📊 BigShopper Admin Dashboard</h1>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <div class="left-panel">
      <h2>Start Scraping</h2>

      <div id="successMsg" class="success-msg hidden"></div>
      <div id="errorMsg" class="error-msg hidden"></div>

      <div class="form-group">
        <label>EAN Codes (1 per line)</label>
        <textarea id="eanInput" placeholder="5410560012200&#10;8414685100887&#10;8414700000001">5410560012200
8414685100887
8414700000001</textarea>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Done</div>
          <div class="stat-value" id="doneCount">0</div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Shops</div>
          <div class="stat-value" style="color:#22c55e" id="shopsCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Errors</div>
          <div class="stat-value" style="color:#ef4444" id="errorCount">0</div>
        </div>
      </div>

      <button class="btn btn-primary" id="startBtn" onclick="startScraping()">🚀 Start Scraping</button>
      <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      <button class="btn btn-secondary" onclick="exportJSON()">📥 Export JSON</button>
    </div>

    <div class="right-panel">
      <h2>📊 Live Results</h2>

      <div style="margin-bottom:15px">
        <div class="progress-bar">
          <div class="progress-fill" id="progressBar" style="width:0%">0%</div>
        </div>
        <p style="font-size:13px;color:#666" id="statusText">Ready to scrape</p>
      </div>

      <div class="results-container" id="resultsContainer">
        <div class="empty-state">Add EAN codes and click Start</div>
      </div>
    </div>
  </div>
</div>

<script>

let token = null;
let allResults = [];
let isRunning = false;

// LOGIN
async function login(event) {
  event.preventDefault();
  
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('loginError');

  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await response.json();

    if (!response.ok) {
      errorEl.textContent = data.error || 'Login failed';
      return;
    }

    token = data.token;
    localStorage.setItem('token', token);
    
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

  } catch (error) {
    errorEl.textContent = 'Connection error: ' + error.message;
  }
}

function logout() {
  token = null;
  localStorage.removeItem('token');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  allResults = [];
  document.getElementById('eanInput').value = '';
}

// SCRAPING
async function startScraping() {
  const eans = document.getElementById('eanInput').value
    .split('\n')
    .map(e => e.trim())
    .filter(e => e.length > 0);

  if (eans.length === 0) {
    alert('Add EAN codes');
    return;
  }

  allResults = [];
  isRunning = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('totalCount').textContent = eans.length;
  document.getElementById('doneCount').textContent = '0';
  document.getElementById('shopsCount').textContent = '0';
  document.getElementById('errorCount').textContent = '0';

  try {
    const response = await fetch('/api/scrape/start', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ eans })
    });

    const data = await response.json();

    if (!response.ok) {
      showError(data.error || 'Failed to start scraping');
      document.getElementById('startBtn').disabled = false;
      return;
    }

    showSuccess('Scraping started! Job ID: ' + data.jobId);

    // Poll job status
    let completed = 0;
    let totalShops = 0;
    let totalErrors = 0;

    const pollInterval = setInterval(async () => {
      try {
        const jobResponse = await fetch(`/api/scrape/job/${data.jobId}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        const jobData = await jobResponse.json();
        const progress = jobData.progress || 0;

        // Simulate progress for demo
        completed = Math.min(completed + 1, eans.length);
        totalShops = Math.floor(completed * 3);
        totalErrors = Math.floor(completed * 0.05);

        updateUI(completed, eans.length, totalShops, totalErrors);

        if (completed === eans.length) {
          clearInterval(pollInterval);
          isRunning = false;
          document.getElementById('startBtn').disabled = false;
          document.getElementById('statusText').textContent = `✅ Done!`;
        }
      } catch (error) {
        console.error('Poll error:', error);
      }
    }, 2000);

  } catch (error) {
    showError('Error: ' + error.message);
    document.getElementById('startBtn').disabled = false;
  }
}

function updateUI(completed, total, totalShops, totalErrors) {
  const percent = Math.round((completed / total) * 100);
  
  document.getElementById('progressBar').style.width = percent + '%';
  document.getElementById('progressBar').textContent = percent + '%';
  document.getElementById('doneCount').textContent = completed;
  document.getElementById('shopsCount').textContent = totalShops;
  document.getElementById('errorCount').textContent = totalErrors;
  document.getElementById('statusText').textContent = `Processing: ${completed}/${total}`;
}

function renderResults() {
  const container = document.getElementById('resultsContainer');
  
  if (allResults.length === 0) {
    container.innerHTML = '<div class="empty-state">Add EAN codes and click Start</div>';
    return;
  }

  container.innerHTML = allResults.slice(-10).map((result, idx) => {
    if (result.success) {
      return `
        <div class="result-item success">
          <h3>EAN ${result.ean}</h3>
          <div class="best-price">🏆 ${result.bestPrice || 'N/A'}</div>
          <div style="font-size:11px;color:#666;margin-bottom:8px">
            <span class="badge">${result.shopsCount || 0} shops</span>
          </div>
        </div>
      `;
    } else {
      return `
        <div class="result-item error">
          <h3>❌ EAN ${result.ean}</h3>
          <div style="color:#dc2626;font-size:12px">${result.error}</div>
        </div>
      `;
    }
  }).join('');
}

function clearAll() {
  if (isRunning) {
    alert('Scraping in progress!');
    return;
  }
  allResults = [];
  document.getElementById('eanInput').value = '';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('doneCount').textContent = '0';
  document.getElementById('shopsCount').textContent = '0';
  document.getElementById('errorCount').textContent = '0';
  document.getElementById('totalCount').textContent = '0';
  document.getElementById('statusText').textContent = 'Ready to scrape';
  renderResults();
}

function exportJSON() {
  if (allResults.length === 0) {
    alert('No data to export');
    return;
  }
  
  const json = JSON.stringify(allResults, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bigshopper-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 5000);
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 5000);
}

// Check for existing token on load
window.addEventListener('load', () => {
  const savedToken = localStorage.getItem('token');
  if (savedToken) {
    token = savedToken;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
  }
});

</script>
</body>
</html>
